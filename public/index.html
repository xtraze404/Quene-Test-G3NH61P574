<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walmart Queue Bot Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    header p {
      opacity: 0.9;
      font-size: 1.1em;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .card h2 {
      font-size: 1.3em;
      margin-bottom: 15px;
      color: #667eea;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 10px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      margin: 20px auto;
      font-size: 1.2em;
      font-weight: bold;
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .status-idle {
      background: #e0e0e0;
      color: #666;
    }

    .status-logging_in {
      background: #fff3cd;
      color: #856404;
      animation: pulse 1s infinite;
    }

    .status-monitoring {
      background: #d4edda;
      color: #155724;
    }

    .status-in_queue {
      background: #cce5ff;
      color: #004085;
      animation: pulse 1.5s infinite;
    }

    .status-awaiting_approval {
      background: #fff3cd;
      color: #856404;
      animation: pulse 0.5s infinite;
    }

    .status-checking_out {
      background: #d1ecf1;
      color: #0c5460;
    }

    .status-completed {
      background: #d4edda;
      color: #155724;
    }

    .status-error {
      background: #f8d7da;
      color: #721c24;
    }

    .status-stopped {
      background: #e2e3e5;
      color: #383d41;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .status-message {
      text-align: center;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-top: 15px;
      font-weight: 500;
    }

    .product-info {
      margin-top: 15px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .product-info strong {
      color: #667eea;
    }

    .queue-details {
      margin-top: 10px;
      padding: 10px;
      background: #e7f3ff;
      border-radius: 8px;
      font-size: 0.95em;
    }

    .approval-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 15px 20px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-approve {
      background: #28a745;
      color: white;
    }

    .btn-approve:hover:not(:disabled) {
      background: #218838;
      transform: translateY(-2px);
    }

    .btn-cancel {
      background: #dc3545;
      color: white;
    }

    .btn-cancel:hover:not(:disabled) {
      background: #c82333;
      transform: translateY(-2px);
    }

    .btn-start {
      background: #667eea;
      color: white;
    }

    .btn-start:hover:not(:disabled) {
      background: #5a6fd6;
    }

    .btn-stop {
      background: #6c757d;
      color: white;
    }

    .btn-stop:hover:not(:disabled) {
      background: #5a6268;
    }

    .control-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .products-list {
      list-style: none;
    }

    .products-list li {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .products-list li:last-child {
      border-bottom: none;
    }

    .product-name {
      font-weight: 500;
    }

    .product-status {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8em;
      font-weight: bold;
    }

    .status-waiting {
      background: #e0e0e0;
      color: #666;
    }

    .status-checking {
      background: #fff3cd;
      color: #856404;
    }

    .status-in-stock {
      background: #d4edda;
      color: #155724;
    }

    .status-out-of-stock {
      background: #f8d7da;
      color: #721c24;
    }

    .history-log {
      max-height: 300px;
      overflow-y: auto;
      background: #1e1e1e;
      border-radius: 8px;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
    }

    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid #333;
      display: flex;
      gap: 10px;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-timestamp {
      color: #888;
      flex-shrink: 0;
    }

    .log-level-info {
      color: #4fc3f7;
    }

    .log-level-success {
      color: #81c784;
    }

    .log-level-warning {
      color: #ffb74d;
    }

    .log-level-error {
      color: #e57373;
    }

    .connection-status {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: bold;
      z-index: 1000;
    }

    .connected {
      background: #28a745;
      color: white;
    }

    .disconnected {
      background: #dc3545;
      color: white;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="connection-status disconnected" id="connectionStatus">Disconnected</div>

  <div class="container">
    <header>
      <h1>🛒 Walmart Queue Bot</h1>
      <p>Real-time monitoring and checkout automation</p>
    </header>

    <div class="dashboard-grid">
      <!-- Status Card -->
      <div class="card">
        <h2>Current Status</h2>
        <div class="status-indicator status-idle" id="statusIndicator">
          IDLE
        </div>
        <div class="status-message" id="statusMessage">Waiting to start...</div>
        
        <div class="product-info hidden" id="productInfo">
          <strong>Product:</strong> <span id="currentProduct">-</span>
        </div>

        <div class="queue-details hidden" id="queueDetails">
          <div><strong>Queue Position:</strong> <span id="queuePosition">-</span></div>
          <div><strong>Wait Time:</strong> <span id="waitTime">-</span></div>
        </div>

        <div class="approval-buttons hidden" id="approvalButtons">
          <button class="btn btn-approve" id="approveBtn" onclick="approveCheckout()">
            ✓ Approve Checkout
          </button>
          <button class="btn btn-cancel" id="cancelBtn" onclick="cancelCheckout()">
            ✗ Cancel
          </button>
        </div>

        <div class="control-buttons">
          <button class="btn btn-start" id="startBtn" onclick="startBot()">Start Bot</button>
          <button class="btn btn-stop" id="stopBtn" onclick="stopBot()" disabled>Stop</button>
        </div>
      </div>

      <!-- Products Card -->
      <div class="card">
        <h2>Watch List</h2>
        <ul class="products-list" id="productsList">
          <li>Loading products...</li>
        </ul>
      </div>
    </div>

    <!-- History Log -->
    <div class="card">
      <h2>Activity Log</h2>
      <div class="history-log" id="historyLog">
        <div class="log-entry">
          <span class="log-timestamp">--:--:--</span>
          <span class="log-level-info">Dashboard initialized</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let currentStatus = {};

    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => {
        document.getElementById('connectionStatus').className = 'connection-status connected';
        document.getElementById('connectionStatus').textContent = 'Connected';
        addLog('Connected to server', 'info');
      };

      ws.onclose = () => {
        document.getElementById('connectionStatus').className = 'connection-status disconnected';
        document.getElementById('connectionStatus').textContent = 'Disconnected';
        addLog('Disconnected from server', 'error');
        setTimeout(connect, 3000); // Reconnect after 3 seconds
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        addLog('Connection error', 'error');
      };

      ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        handleMessage(message);
      };
    }

    function handleMessage(message) {
      switch (message.type) {
        case 'status':
          updateStatus(message.data);
          break;
        case 'checking':
          updateProductStatus(message.product.name, 'checking');
          break;
        case 'stock-status':
          updateProductStatus(message.data.product.name, message.data.status);
          break;
        case 'stock-detected':
          addLog(`🎯 STOCK DETECTED: ${message.product.name}`, 'success');
          break;
        case 'checkout-ready':
          addLog(`🛒 CHECKOUT READY for ${message.data.product.name}!`, 'warning');
          break;
        case 'order-complete':
          addLog(`🎉 ORDER PLACED: ${message.data.product.name}`, 'success');
          break;
        case 'checkout-cancelled':
          addLog('Checkout cancelled by user', 'info');
          break;
        case 'stock-lost':
          addLog(`⚠️ Stock lost for ${message.data.product.name}`, 'error');
          break;
        case 'timeout':
          addLog(`⏰ Queue timeout for ${message.data.product.name}`, 'error');
          break;
        case 'error':
          addLog(`❌ Error: ${message.data.error}`, 'error');
          break;
      }
    }

    function updateStatus(data) {
      currentStatus = data;
      
      const indicator = document.getElementById('statusIndicator');
      const messageEl = document.getElementById('statusMessage');
      const productInfo = document.getElementById('productInfo');
      const queueDetails = document.getElementById('queueDetails');
      const approvalButtons = document.getElementById('approvalButtons');
      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');

      // Update status indicator
      indicator.className = `status-indicator status-${data.status}`;
      indicator.textContent = formatStatus(data.status);

      // Update message
      messageEl.textContent = data.message || 'No status message';

      // Update product info
      if (data.product) {
        productInfo.classList.remove('hidden');
        document.getElementById('currentProduct').textContent = data.product.name;
      } else {
        productInfo.classList.add('hidden');
      }

      // Update queue details
      if (data.queuePosition !== null || data.waitTime) {
        queueDetails.classList.remove('hidden');
        document.getElementById('queuePosition').textContent = data.queuePosition || 'Unknown';
        document.getElementById('waitTime').textContent = data.waitTime || 'Unknown';
      } else {
        queueDetails.classList.add('hidden');
      }

      // Show/hide approval buttons
      if (data.requiresApproval) {
        approvalButtons.classList.remove('hidden');
        startBtn.disabled = true;
        stopBtn.disabled = true;
      } else {
        approvalButtons.classList.add('hidden');
        startBtn.disabled = data.status === 'monitoring' || data.status === 'in_queue';
        stopBtn.disabled = data.status === 'idle' || data.status === 'stopped';
      }

      // Add to log
      if (data.message) {
        addLog(data.message, 'info');
      }
    }

    function formatStatus(status) {
      return status.split('_').map(word => 
        word.charAt(0).toUpperCase() + word.slice(1)
      ).join(' ');
    }

    function updateProductStatus(productName, status) {
      const items = document.querySelectorAll('.products-list li');
      items.forEach(item => {
        const nameEl = item.querySelector('.product-name');
        if (nameEl && nameEl.textContent === productName) {
          const statusEl = item.querySelector('.product-status');
          if (statusEl) {
            statusEl.textContent = formatProductStatus(status);
            statusEl.className = `product-status status-${status.replace('_', '-')}`;
          }
        }
      });
    }

    function formatProductStatus(status) {
      const mapping = {
        'in_stock': 'In Stock',
        'out_of_stock': 'Out of Stock',
        'unknown': 'Checking',
        'checking': 'Checking...'
      };
      return mapping[status] || status;
    }

    async function loadProducts() {
      try {
        const response = await fetch('/api/products');
        const products = await response.json();
        
        const listEl = document.getElementById('productsList');
        listEl.innerHTML = '';
        
        products.forEach(product => {
          const li = document.createElement('li');
          li.innerHTML = `
            <span class="product-name">${product.name}</span>
            <span class="product-status status-waiting">Waiting</span>
          `;
          listEl.appendChild(li);
        });
      } catch (error) {
        console.error('Error loading products:', error);
      }
    }

    async function loadHistory() {
      try {
        const response = await fetch('/api/history');
        const history = await response.json();
        
        const logEl = document.getElementById('historyLog');
        logEl.innerHTML = '';
        
        history.forEach(entry => {
          addLog(entry.message, entry.level, entry.timestamp);
        });
      } catch (error) {
        console.error('Error loading history:', error);
      }
    }

    function addLog(message, level = 'info', timestamp = null) {
      const logEl = document.getElementById('historyLog');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      
      const time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
      
      entry.innerHTML = `
        <span class="log-timestamp">${time}</span>
        <span class="log-level-${level}">${message}</span>
      `;
      
      logEl.insertBefore(entry, logEl.firstChild);
      
      // Keep only last 50 entries in view
      while (logEl.children.length > 50) {
        logEl.removeChild(logEl.lastChild);
      }
    }

    async function startBot() {
      try {
        const response = await fetch('/api/start', { method: 'POST' });
        const result = await response.json();
        
        if (result.success) {
          addLog('Bot started', 'success');
        } else {
          addLog(`Failed to start bot: ${result.message}`, 'error');
        }
      } catch (error) {
        addLog(`Error starting bot: ${error.message}`, 'error');
      }
    }

    async function stopBot() {
      try {
        const response = await fetch('/api/stop', { method: 'POST' });
        const result = await response.json();
        
        if (result.success) {
          addLog('Bot stopped', 'info');
        } else {
          addLog(`Failed to stop bot: ${result.message}`, 'error');
        }
      } catch (error) {
        addLog(`Error stopping bot: ${error.message}`, 'error');
      }
    }

    async function approveCheckout() {
      try {
        const response = await fetch('/api/approve-checkout', { method: 'POST' });
        const result = await response.json();
        
        if (result.success) {
          addLog('Checkout approved by user', 'success');
        } else {
          addLog(`Failed to approve: ${result.message}`, 'error');
        }
      } catch (error) {
        addLog(`Error approving checkout: ${error.message}`, 'error');
      }
    }

    async function cancelCheckout() {
      try {
        const response = await fetch('/api/cancel-checkout', { method: 'POST' });
        const result = await response.json();
        
        if (result.success) {
          addLog('Checkout cancelled by user', 'info');
        } else {
          addLog(`Failed to cancel: ${result.message}`, 'error');
        }
      } catch (error) {
        addLog(`Error cancelling checkout: ${error.message}`, 'error');
      }
    }

    // Initialize dashboard
    document.addEventListener('DOMContentLoaded', () => {
      loadProducts();
      loadHistory();
      connect();
    });
  </script>
</body>
</html>
